<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0; padding:0; background-color:#0f172a; font-family:'Segoe UI',Roboto,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:640px; margin:auto; background:#1e293b; border-radius:12px; overflow:hidden; margin-top:20px;">
  <tr><td style="background:linear-gradient(135deg,#ef4444,#f97316); padding:32px 24px;">
    <h1 style="color:#fff; margin:0; font-size:22px;">&#9888; Issue Alert</h1>
    <p style="color:#fecaca; margin:8px 0 0; font-size:14px;">{{ timestamp }}</p>
  </td></tr>
  <tr><td style="padding:24px;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#334155; border-radius:8px; padding:16px;">
      <tr><td>
        <p style="color:#94a3b8; font-size:12px; margin:0;">Company</p>
        <p style="color:#e2e8f0; font-size:16px; margin:4px 0 12px; font-weight:600;">{{ company_name }}</p>
        <p style="color:#94a3b8; font-size:12px; margin:0;">Issue Type</p>
        <p style="color:#e2e8f0; font-size:16px; margin:4px 0 12px; font-weight:600;">{{ issue_type }}</p>
        <p style="color:#94a3b8; font-size:12px; margin:0;">Severity</p>
        <p style="color:{% if severity == 'critical' %}#ef4444{% elif severity == 'error' %}#f97316{% else %}#eab308{% endif %}; font-size:16px; margin:4px 0 12px; font-weight:600; text-transform:uppercase;">{{ severity }}</p>
      </td></tr>
    </table>
    <h3 style="color:#e2e8f0; font-size:16px; margin:20px 0 8px;">Description</h3>
    <p style="color:#cbd5e1; font-size:14px; line-height:1.6;">{{ description }}</p>
    <a href="http://localhost:3000/companies/{{ company_name | lower | replace(' ', '-') }}" style="display:inline-block; margin-top:16px; background:linear-gradient(135deg,#ef4444,#f97316); color:#fff; padding:10px 24px; border-radius:8px; text-decoration:none; font-size:14px;">View in Dashboard &rarr;</a>
  </td></tr>
  <tr><td style="padding:16px 24px; background:#0f172a; text-align:center;">
    <p style="color:#64748b; font-size:11px; margin:0;">Apex Capital Partners &bull; Automated Alert</p>
  </td></tr>
</table>
</body>
</html>
